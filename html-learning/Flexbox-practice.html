<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flexbox Practice</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; padding: 20px; }
    
    /* ================================
       FLEXBOX CONTAINER PROPERTIES
       ================================ */
    
    .container {
      display: flex;              /* Activates flexbox */
      
      /* Direction */
      flex-direction: row;        /* default — horizontal */
      /* flex-direction: column; */  /* vertical */
      /* flex-direction: row-reverse; */
      /* flex-direction: column-reverse; */
      
      /* Wrapping */
      flex-wrap: nowrap;          /* default — no wrap */
      /* flex-wrap: wrap; */      /* wraps to next line */
      
      /* Shorthand */
      /* flex-flow: row wrap; */
      
      /* Alignment on MAIN axis (horizontal if row) */
      /* justify-content: flex-start;   default */
      /* justify-content: flex-end; */
      justify-content: center;
      /* justify-content: space-between; */ /* equal space between */
      /* justify-content: space-around; */  /* equal space around */
      /* justify-content: space-evenly; */  /* perfectly equal space */
      
      /* Alignment on CROSS axis (vertical if row) */
      /* align-items: stretch;      default — fill height */
      align-items: flex-start;
      /* align-items: flex-end; */
      /* align-items: center; */
      
      /* Gap between items */
      gap: 25px;
      
      height: 300px;
      background: #f0f0f0;
      padding: 20px;
    }
    
    .item {
      background: #3498db;
      color: white;
      padding: 20px;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
    }
    
    /* ================================
       FLEXBOX ITEM PROPERTIES
       ================================ */
    
    .item-grow {
      flex-grow: 1;      /* takes remaining space */
    }
    
    .item-shrink {
      flex-shrink: 0;    /* never shrinks */
    }
    
    .item-basis {
      flex-basis: 200px; /* starting size */
    }
    
    /* Shorthand: flex: grow shrink basis */
    .item-flex {
      flex: 1;           /* flex: 1 1 0 */
    }
    
    /* Self alignment — overrides align-items */
    .item-self {
      align-self: flex-end;
    }
    
    /* Order — change visual order without changing HTML */
    .item-order {
      order: -1;         /* moves to front */
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
  </div>
</body>
</html>
